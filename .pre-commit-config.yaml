# Revs are pinned via `pre-commit autoupdate` (run during harness setup).
# Keep them in sync with the floors in pyproject.toml's dev/security groups.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        # SYNTHETIC run-results carry ledger hash-chain entries (sha256 hex —
        # high-entropy by construction, not secrets) that regenerate
        # non-deterministically. Synthetic-data-only is project policy, so these are
        # excluded from secret scanning, not baselined: the test fixtures dir and the
        # committed demo recording (src/keystone/demo/recorded_run.json).
        exclude: ^(tests/fixtures/|src/keystone/demo/recorded_run\.json$)

  # Architecture boundaries (deterministic core must not import the edge).
  # Local hook so it uses the project's pinned import-linter via uv.
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter (architecture boundaries)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        files: ^src/keystone/.*\.py$|^pyproject\.toml$
